services:
  api:
    environment:
      AUTH_COOKIE_SECURE: "true"
      AUTH_COOKIE_SAMESITE: "lax"

  frontend:
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    command: >
      /bin/sh -c "cp /etc/nginx/https.conf /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
