services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  mal-api:
    image: ghcr.io/sep4real/sep4/mal-api:main
    build:
      context: ./MAL
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB must be set}
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: api:local
    build:
      context: ./API
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB must be set}
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      MAL_API_HOST_PORT: ${MAL_API_HOST_PORT:?MAL_API_HOST_PORT must be set}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/sep4real/sep4/frontend:main
    build:
      context: ./Frontend
    environment:
      API_PROXY_URL: ${API_PROXY_URL:-http://api:8080/}
    expose:
      - "80"
    depends_on:
      - api

volumes:
  postgres_data:
