name: IoT CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'IOT/**'

jobs:
  iot-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOT
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Create secrets.ini
        run: |
          cat > secrets.ini << EOF
          [secrets]
          build_flags =
              -DSERVER_HOST='"test_host"'
              -DSERVER_PORT=2137
              -DWIFI_SSID='"test_ssid"'
              -DWIFI_PASSWORD='"test_password"'
          EOF

      - name: Run tests with coverage
        run: make coverage

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: IOT/coverage-html

  iot-build:
    runs-on: ubuntu-latest
    needs: iot-test
    defaults:
      run:
        working-directory: IOT
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('IOT/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Create secrets.ini
        run: |
          cat > secrets.ini << EOF
          [secrets]
          build_flags =
              -DSERVER_HOST='"test_host"'
              -DSERVER_PORT=2137
              -DWIFI_SSID='"test_ssid"'
              -DWIFI_PASSWORD='"test_password"'
          EOF

      - name: Build
        run: pio run -e megaatmega2560

      - name: Upload .hex artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: IOT/.pio/build/megaatmega2560/firmware.hex