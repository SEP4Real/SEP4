name: IoT CI/CD

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'IOT/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOT
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run tests
        run: pio test -e native

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: IOT
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run -e mega2560

      - name: Upload .hex artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: IOT/.pio/build/mega2560/firmware.hex