name: IoT CI/CD

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'IOT/**'

jobs:
  iot-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IOT
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO and lcov
        run: |
          pip install platformio
          sudo apt-get install -y lcov

      - name: Run tests
        run: pio test -e native-coverage

      - name: Generate coverage report
        run: |
          lcov --capture --directory .pio/build/native-coverage \
               --output-file coverage.info \
               --ignore-errors mismatch,unused
          lcov --remove coverage.info \
               '*/.pio/*' '*/fakes/*' '*/unity/*' '*/test/*' '/usr/*' \
               --output-file coverage.info \
               --ignore-errors unused
          genhtml coverage.info --output-directory coverage-html

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: IOT/coverage-html

  iot-build:
    runs-on: ubuntu-latest
    needs: iot-test
    defaults:
      run:
        working-directory: IOT
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run -e megaatmega2560

      - name: Upload .hex artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: IOT/.pio/build/megaatmega2560/firmware.hex