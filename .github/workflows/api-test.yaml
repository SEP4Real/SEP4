name: API Tests & Coverage

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for API changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.base_ref }}
          filters: |
            api:
              - 'API/**'

  api-test:
    needs: detect-changes
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: test
      DB_USER: test
      DB_PASSWORD: test
      MAL_API_HOST_PORT: http://localhost:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Skip API tests (no API changes)
      	if: needs.detect-changes.outputs.api != 'true'
        run: echo "No API changes detected; skipping tests."

      - name: Set up Python
        if: needs.detect-changes.outputs.api == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: needs.detect-changes.outputs.api == 'true'
        working-directory: API
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx passlib[bcrypt] python-jose

      - name: Run tests with coverage
        if: needs.detect-changes.outputs.api == 'true'
        working-directory: API
        run: |
          pytest tests/ --cov=app --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        if: needs.detect-changes.outputs.api == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: API/htmlcov/