name: Enforce Main PR Sources 
on:
  pull_request:
    branches: [ main ]
jobs:
  branch-rules: # This exactly matches your required check in the UI
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        if: ${{ github.head_ref != 'dev' && !startsWith(github.head_ref, 'fix/') }}
        run: |
          echo "Error: Invalid source branch."
          exit 1