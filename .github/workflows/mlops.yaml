name: MLOps Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/mlops.yaml'
      - 'MAL/**'
      - 'linearized_session_windows.csv'
      - 'ratings.csv'
      - 'environment_history.csv'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/mlops.yaml'
      - 'MAL/**'
      - 'linearized_session_windows.csv'
      - 'ratings.csv'
      - 'environment_history.csv'

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: sep4_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r MAL/requirements.txt

    - name: Verify trained model is committed
      run: |
        test -f MAL/models/rf_model.pkl || {
          echo "::error::MAL/models/rf_model.pkl is missing. Train locally with 'python scripts/train_model.py' from MAL/ and commit the artifact."
          exit 1
        }

    - name: Run unit tests with coverage
      working-directory: MAL
      run: |
        python -m pytest tests/test_model_unit.py tests/test_main_endpoints.py -v \
          --cov=ml_pipeline \
          --cov=backend \
          --cov-report=term-missing \
          --cov-report=html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: mal-coverage-report
        path: MAL/htmlcov/

    - name: Start MAL service
      run: |
        cd MAL
        uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &
        for i in $(seq 1 30); do
          curl -sf http://localhost:8000/ && break
          sleep 1
        done
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: sep4_db
        DB_USER: user
        DB_PASSWORD: password

    - name: Run API Tests
      run: |
        python -m pytest MAL/tests/test_prediction_api.py -v

    - name: Log in to the Container registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/sep4real/sep4/mal-api

    - name: Build and push Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: ./MAL
        # rf_model.pkl is committed to the repo and copied into the image via
        # the Dockerfile's `COPY models ./models` step. No retraining at build time.
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
