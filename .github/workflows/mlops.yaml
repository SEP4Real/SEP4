name: MLOps Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'MAL/**'
      - 'focus_dataset.csv'
      - 'ratings.csv'
      - 'environment_history.csv'
  pull_request:
    branches: [ main ]
    paths:
      - 'MAL/**'
      - 'focus_dataset.csv'
      - 'ratings.csv'
      - 'environment_history.csv'

jobs:
  test-and-train:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: sep4_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r MAL/requirements.txt

    - name: Run ML Unit Tests
      run: |
        # Placeholder for future ML unit tests (data processing, model validation)
        # Note: You can add tests to a MAL/tests directory later
        python -m pytest MAL/ --ignore=MAL/app/main.py || echo "No ML tests found yet"

    - name: Train Model
      run: |
        cd MAL/app
        # Run the model training script
        # This will regenerate the model in memory/filesystem
        python model.py

    - name: Upload Trained Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: |
          MAL/app/*.pkl
          MAL/app/*.h5
          # Add any other model files here
