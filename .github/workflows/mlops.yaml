name: MLOps Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/mlops.yaml'
      - 'MAL/**'
      - 'focus_dataset.csv'
      - 'ratings.csv'
      - 'environment_history.csv'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/mlops.yaml'
      - 'MAL/**'
      - 'focus_dataset.csv'
      - 'ratings.csv'
      - 'environment_history.csv'

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: sep4_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r MAL/requirements.txt

    - name: Run ML Unit Tests
      run: |
        # Placeholder for future ML unit tests (data processing, model validation)
        # Note: You can add tests to a MAL/tests directory later
        python -m pytest MAL/ --ignore=MAL/app/main.py || echo "No ML tests found yet"

    - name: Train Model
      run: |
        cd MAL
        python -m app.train_model

    - name: Upload Trained Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: |
          MAL/app/*.pkl
          MAL/app/*.h5
          # Add any other model files here
          
    - name: Log in to the Container registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/sep4real/sep4/mal-api

    - name: Build and push Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: ./MAL
        # The trained model is in MAL/app because we just ran app.train_model
        # so it will be included in the Docker image by the COPY app ./app instruction in Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    - name: Trigger Coolify Deployment
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        curl -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"