name: Build Final Hand-in Package

on:
  workflow_dispatch:

jobs:
  build-and-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python and Pip
        run: |
          sudo apt-get install -y python3-pip python3-setuptools python3-wheel

      - name: Install WeasyPrint dependencies
        run: |
          sudo apt-get install -y python3-cffi libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info poppler-utils zip

      - name: Install WeasyPrint
        run: |
          pip3 install weasyprint Pillow

      - name: Run Build Submission Script
        run: |
          chmod +x ./build_submission.sh
          ./build_submission.sh

      - name: Upload Merged PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyHelper_Final_Handin_PDF
          path: Documentation/StudyHelper_Final_Handin.pdf

      - name: Upload Final ZIP Submission
        uses: actions/upload-artifact@v4
        with:
          name: StudyHelper_Final_Handin_ZIP
          path: StudyHelper_Final_Handin.zip
