name: Compile Reports to PDF

on:
  push:
    paths:
      - 'Documentation/ProcessReport/process-report.md'
      - 'Documentation/ProjectReport/project-report.md'
      - 'Misc/AcademicTemplate/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python and Pip
        run: |
          sudo apt-get install -y python3-pip python3-setuptools python3-wheel

      - name: Install WeasyPrint dependencies
        run: |
          sudo apt-get install -y python3-cffi libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install WeasyPrint
        run: |
          pip3 install weasyprint

      - name: Compile Process Report
        run: |
          make -f Misc/AcademicTemplate/Makefile SRC=Documentation/ProcessReport/process-report.md pdf
          rm -f Documentation/ProcessReport/process-report.html

      - name: Compile Project Report
        run: |
          make -f Misc/AcademicTemplate/Makefile SRC=Documentation/ProjectReport/project-report.md pdf
          rm -f Documentation/ProjectReport/project-report.html

      - name: Commit and push updated PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): auto-compile reports to PDF [skip ci]"
          file_pattern: 'Documentation/**/*.pdf'
